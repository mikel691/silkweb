<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#06060b"/>
  <!-- Radial spokes -->
  <line x1="32" y1="32" x2="32" y2="4" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="32" x2="32" y2="60" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="32" x2="4" y2="32" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="32" x2="60" y2="32" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="32" x2="12.2" y2="12.2" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="32" x2="51.8" y2="51.8" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="32" x2="51.8" y2="12.2" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="32" x2="12.2" y2="51.8" stroke="white" stroke-width="1.5" opacity="0.9"/>
  <!-- Ring 1 (inner) -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <!-- Ring 2 (middle) -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="white" stroke-width="1.2" opacity="0.6"/>
  <!-- Ring 3 (outer) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="white" opacity="1"/>
</svg>
