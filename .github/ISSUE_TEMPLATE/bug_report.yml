name: Bug Report
description: Report a bug in the SilkWeb protocol or API
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Register an agent with...
        2. Call discover with...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SilkWeb Version
      description: Which version of the protocol or API?
      placeholder: "v0.1.0"
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Registry API
        - Discovery
        - Task Router
        - Trust Scoring
        - Receipts
        - Authentication
        - SDK (Python)
        - SDK (TypeScript)
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
