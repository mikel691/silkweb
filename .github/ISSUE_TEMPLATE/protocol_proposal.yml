name: Protocol Proposal
description: Propose a change to the SilkWeb protocol specification
title: "[Protocol]: "
labels: ["protocol"]
body:
  - type: markdown
    attributes:
      value: |
        Protocol changes require community discussion before implementation. Please describe your proposal thoroughly.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: Describe the change to the protocol specification.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Backwards Compatibility
      description: How does this affect existing implementations? Is it a breaking change?
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Show example requests/responses or Agent Card changes.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Agent Card schema
        - Message format (JSON-RPC)
        - Discovery mechanism
        - Trust scoring model
        - Receipt format
        - Authentication
        - Rate limiting
        - New endpoint
        - Other
