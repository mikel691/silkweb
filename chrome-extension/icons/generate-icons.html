<!DOCTYPE html>
<html>
<head><title>SilkWeb Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px">
  <h1>SilkWeb Icon Generator</h1>
  <p>Click the button to generate and download all three icon sizes.</p>
  <button id="gen" style="padding:12px 24px;background:#6366f1;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">
    Generate & Download Icons
  </button>
  <div id="preview" style="margin-top:20px;display:flex;gap:20px;align-items:end"></div>

  <script>
    function drawSpiderWeb(ctx, size) {
      const center = size / 2;
      const radius = size * 0.42;
      const purple = '#6366f1';

      ctx.clearRect(0, 0, size, size);

      // Radial lines (spokes)
      const spokes = 8;
      ctx.strokeStyle = purple;
      ctx.lineWidth = Math.max(0.5, size * 0.015);
      ctx.globalAlpha = 0.5;
      for (let i = 0; i < spokes; i++) {
        const angle = (i / spokes) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.lineTo(center + Math.cos(angle) * radius, center + Math.sin(angle) * radius);
        ctx.stroke();
      }

      // Concentric web rings
      const rings = 3;
      ctx.globalAlpha = 0.7;
      ctx.lineWidth = Math.max(0.5, size * 0.02);
      for (let r = 1; r <= rings; r++) {
        const ringRadius = (radius / rings) * r;
        ctx.beginPath();
        for (let i = 0; i <= spokes; i++) {
          const angle = (i / spokes) * Math.PI * 2 - Math.PI / 2;
          const x = center + Math.cos(angle) * ringRadius;
          const y = center + Math.sin(angle) * ringRadius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // Center dot
      ctx.globalAlpha = 1;
      ctx.fillStyle = purple;
      ctx.beginPath();
      ctx.arc(center, center, Math.max(1, size * 0.08), 0, Math.PI * 2);
      ctx.fill();

      // Outer ring
      ctx.strokeStyle = purple;
      ctx.lineWidth = Math.max(1, size * 0.03);
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(center, center, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    document.getElementById('gen').addEventListener('click', () => {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';

      [16, 48, 128].forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        drawSpiderWeb(ctx, size);

        // Preview
        const wrapper = document.createElement('div');
        wrapper.style.textAlign = 'center';
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.style.border = '1px solid #333';
        img.style.imageRendering = size <= 48 ? 'pixelated' : 'auto';
        const label = document.createElement('div');
        label.textContent = size + 'x' + size;
        label.style.marginTop = '4px';
        label.style.fontSize = '12px';
        label.style.color = '#888';
        wrapper.appendChild(img);
        wrapper.appendChild(label);
        preview.appendChild(wrapper);

        // Download
        const link = document.createElement('a');
        link.download = 'icon' + size + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });
  </script>
</body>
</html>
